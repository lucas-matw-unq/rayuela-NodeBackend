version: "3.9"
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run start:dev
    ports:
      - '3000:3000'
      - '9229:9229'
    env_file:
      - .env
    environment:
      - DB_CONNECTION=mongodb://root:root@mongodb:27017
      - S3_ENDPOINT=http://garage:3900
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - mongodb
      - garage
    networks:
      - rayuela_net
  mongodb:
    image: mongo:4.4
    container_name: mongodb
    env_file:
      - .env
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - rayuela_net
  garage:
    image: dxflrs/garage:v2.2.0
    container_name: garage
    ports:
      - "3900:3900" # S3 API
      - "3901:3901" # RPC
      - "3902:3902" # Web
      - "3903:3903" # Admin API
    volumes:
      - ./garage.toml:/etc/garage.toml
      - garage_data:/data
    networks:
      - rayuela_net

volumes:
  mongodb_data:
  garage_data:

networks:
  rayuela_net:
    driver: bridge
